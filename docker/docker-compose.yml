services:
  db:
    image: postgres:17
    container_name: database
    volumes:
      - ../database:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: timetable
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 135246
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ..
      dockerfile: docker/backend-Dockerfile
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DEBUG=True
      - DB_HOST=db
      - DB_NAME=timetable
      - DB_USER=postgres
      - DB_PASSWORD=135246
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend-Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend